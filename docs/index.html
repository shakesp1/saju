
<!DOCTYPE html>

<style>
  :root {
    --paper: #FBF6EA;
    --ink: #2A2016;
    --ink-soft: #6B5D48;
    --rule: #E3D6B8;
    --seal: #B5451B;
    --gold: #A9792C;
    --card: #FFFFFF;
    --wood: #3F7D4A;
    --fire: #C0472B;
    --earth: #B8862E;
    --metal: #8A8172;
    --water: #2F4A7A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: 'IBM Plex Sans KR', sans-serif; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 40px 18px 96px; }

  header { border-bottom: 3px solid var(--ink); padding-bottom: 18px; margin-bottom: 4px; }
  .masthead-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em;
    color: var(--seal); text-transform: uppercase; margin-bottom: 8px;
  }
  h1 { font-family: 'Noto Serif KR', serif; font-weight: 900; font-size: 28px; margin: 0 0 6px; }
  .subhead { color: var(--ink-soft); font-size: 13px; }

  .person-tabs { display: flex; gap: 4px; margin: 22px 0 20px; border-bottom: 1px solid var(--rule); overflow-x: auto; }
  .person-tab {
    flex-shrink: 0; font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 14.5px;
    padding: 11px 16px; background: transparent; border: none; border-bottom: 3px solid transparent;
    color: var(--ink-soft); cursor: pointer; margin-bottom: -1px;
  }
  .person-tab.active { color: var(--ink); border-bottom-color: var(--seal); }

  .person-panel { display: none; }

  .profile-card {
    background: var(--card); border: 1px solid var(--rule); border-radius: 6px;
    padding: 16px 20px; margin-bottom: 18px;
  }
  .profile-name { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 18px; margin-bottom: 4px; }
  .profile-meta { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink-soft); }

  .manseryeok-title {
    background: var(--wood); color: #fff; text-align: center; font-family: 'Noto Serif KR', serif;

  .no-data-box {

  .sub-row { font-size: 10.5px; color: var(--ink-soft); padding: 4px 0; border-top: 1px dashed var(--rule); }

  }
  .today-headline { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 16px; margin-bottom: 10px; }
  .today-ganzhi { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .today-ganzhi .char-box { width: 48px; margin-bottom: 0; }

  .reading-list-plain { margin: 0; padding-left: 0; list-style: none; }
  .reading-list-plain li { padding: 9px 0; border-top: 1px solid var(--rule); font-size: 13.5px; line-height: 1.6; }
  .reading-list-plain li:first-child { border-top: none; }

  .haeseol-title {
    background: var(--seal); color: #fff; text-align: center; font-family: 'Noto Serif KR', serif;
    font-weight: 700; font-size: 15px; padding: 9px; border-radius: 4px 4px 0 0;

  .haeseol-hint { text-align: center; font-size: 11px; color: var(--ink-soft); padding: 8px 0; background: var(--card); }
  .accordion { border: 1px solid var(--rule); border-top: none; }
  .acc-item { border-top: 1px solid var(--rule); background: var(--card); }
  .acc-item:first-child { border-top: none; }
  .acc-head {
    width: 100%; text-align: left; background: none; border: none; cursor: pointer;
    padding: 14px 16px; font-size: 14px; font-weight: 600; color: var(--ink);

  .acc-head .chev { color: var(--gold); transition: transform 0.15s ease; flex-shrink: 0; }

  footer {

  @media (max-width: 480px) {

<body>
<div class="wrap">
  <header>
    <div class="masthead-label">Family Saju Ledger</div>
    <h1>가족 사주 원장</h1>
    <div class="subhead">만세력은 정확한 절기 기반 계산으로 고정, "오늘의 운세"는 접속 시점마다 자동 갱신됩니다.</div>
  </header>

  <nav class="person-tabs" id="personTabs"></nav>
  <div id="panels"></div>

  <footer>
    지장간·12운성·12신살은 표준 명리학 공식으로 계산되며, 천을귀인 등 세부 귀인·살 체계와
    합충형파해(合沖刑破害)는 이번 버전에 포함되어 있지 않습니다. "사주해설" 문구는 일간(日干)의
    전통적 상징을 바탕으로 작성된 참고용 콘텐츠이며, 실제 전문 상담을 대체하지 않습니다.
  </footer>
</div>

<script>
/* ===================== 기초 데이터 ===================== */
const TG = ["갑","을","병","정","무","기","경","신","임","계"];
const TG_HANJA = {"갑":"甲","을":"乙","병":"丙","정":"丁","무":"戊","기":"己","경":"庚","신":"辛","임":"壬","계":"癸"};
const DZ = ["자","축","인","묘","진","사","오","미","신","유","술","해"];
const DZ_HANJA = {"자":"子","축":"丑","인":"寅","묘":"卯","진":"辰","사":"巳","오":"午","미":"未","신":"申","유":"酉","술":"戌","해":"亥"};

const STEM_INFO = {
  "갑": {el:"목", yy:"양"}, "을": {el:"목", yy:"음"},
  "병": {el:"화", yy:"양"}, "정": {el:"화", yy:"음"},
  "무": {el:"토", yy:"양"}, "기": {el:"토", yy:"음"},
  "경": {el:"금", yy:"양"}, "신": {el:"금", yy:"음"},
  "임": {el:"수", yy:"양"}, "계": {el:"수", yy:"음"},
};
const BRANCH_ELEMENT = {
  "자":"수","축":"토","인":"목","묘":"목","진":"토","사":"화",
  "오":"화","미":"토","신":"금","유":"금","술":"토","해":"수",
};
const ELEMENT_COLOR = { "목":"var(--wood)", "화":"var(--fire)", "토":"var(--earth)", "금":"var(--metal)", "수":"var(--water)" };
const GENERATES = { "목":"화","화":"토","토":"금","금":"수","수":"목" };
const CONTROLS  = { "목":"토","토":"수","수":"화","화":"금","금":"목" };

function sipsin(dayStem, targetStem) {
  const a = STEM_INFO[dayStem], b = STEM_INFO[targetStem];
  if (a.el === b.el) return a.yy === b.yy ? "비견" : "겁재";
  if (GENERATES[a.el] === b.el) return a.yy === b.yy ? "식신" : "상관";
  if (CONTROLS[a.el] === b.el) return a.yy === b.yy ? "편재" : "정재";
  if (CONTROLS[b.el] === a.el) return a.yy === b.yy ? "편관" : "정관";
  if (GENERATES[b.el] === a.el) return a.yy === b.yy ? "편인" : "정인";
  return "-";
}

/* 12운성 */
const STAGES = ["장생","목욕","관대","건록","제왕","쇠","병","사","묘","절","태","양"];
const CHANGSHENG_START = {"갑":"해","을":"오","병":"인","정":"유","무":"인","기":"유","경":"사","신":"자","임":"신","계":"묘"};
const YANG_STEMS = new Set(["갑","병","무","경","임"]);
function twelveUnseong(dayStem, targetBranch) {
  const s = DZ.indexOf(CHANGSHENG_START[dayStem]);
  const t = DZ.indexOf(targetBranch);
  const k = YANG_STEMS.has(dayStem) ? ((t - s + 12) % 12) : ((s - t + 12) % 12);
  return STAGES[k];
}

/* 12신살 (년지 기준) */
const STARS = ["겁살","재살","천살","지살","년살","월살","망신살","장성살","반안살","역마살","육해살","화개살"];
const GROUP_REF = {
  "해":"신","묘":"신","미":"신",
  "인":"해","오":"해","술":"해",
  "사":"인","유":"인","축":"인",
  "신":"사","자":"사","진":"사",
};
function sinsal(yearBranch, targetBranch) {
  const ref = DZ.indexOf(GROUP_REF[yearBranch]);
  const t = DZ.indexOf(targetBranch);
  return STARS[(t - ref + 12) % 12];
}

/* 지장간 */
const HIDDEN_STEMS = {
  "자":"임계","축":"계신기","인":"무병갑","묘":"갑을","진":"을계무","사":"무경병",
  "오":"병기정","미":"정을기","신":"무임경","유":"경신","술":"신정무","해":"무갑임",
};

/* 오늘의 일진 계산 (60갑자, 1970-01-01 UTC 기준 보정) */
const JIAZI = [];
for (let i = 0; i < 60; i++) JIAZI.push([TG[i % 10], DZ[i % 12]]);
const DAY_OFFSET = 17; // 2024-01-01 = 갑자일 기준으로 검증됨

function todayGanzhi() {
  const kstStr = new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" });
  const kst = new Date(kstStr);
  const daysSinceEpoch = Math.floor(Date.UTC(kst.getFullYear(), kst.getMonth(), kst.getDate()) / 86400000);
  const idx = ((daysSinceEpoch + DAY_OFFSET) % 60 + 60) % 60;
  return { pair: JIAZI[idx], dateStr: `${kst.getFullYear()}-${String(kst.getMonth()+1).padStart(2,'0')}-${String(kst.getDate()).padStart(2,'0')}`, idx };
}

/* ===================== 인물별 고정 사주 데이터 ===================== */
// 연/월/일/시주는 절기 기준 정밀 만세력 계산으로 미리 산출된 고정값이며,
// 시주는 30분 단위 정확한 시간 경계(자시 23:30~01:29 등)를 반영해 계산되었습니다.
const PEOPLE = [
  {
    id: "jaegyun", name: "정재균",
    birthInfo: "1983년 음력 2월 6일 00:30 출생 (양력 1983-03-20)",
    pillars: { year:["계","해"], month:["을","묘"], day:["정","미"], hour:["경","자"] },
  },
  {
    id: "gyeongbin", name: "정경빈",
    birthInfo: "1984년 양력 12월 30일 07:00 출생",
    pillars: { year:["갑","자"], month:["병","자"], day:["무","술"], hour:["을","묘"] },
  },
  {
    id: "doyoung", name: "정도영",
    birthInfo: "2018년 양력 11월 2일 09:25 출생",
    pillars: { year:["무","술"], month:["임","술"], day:["무","술"], hour:["병","진"] },
  },
  {
    id: "seyoung", name: "정세영",
    birthInfo: "2023년 양력 2월 3일 11:06 출생",
    pillars: { year:["임","인"], month:["계","축"], day:["임","진"], hour:["을","사"] },
  },
];

/* ===================== 사주해설 (일간별 도입부 문단) ===================== */
// 각 항목은 [제목, 도입부 문단]. 실제 상세본은 여기에 그 사람의 실제 사주 데이터(십성·신살·12운성)를
// 자동으로 조합한 문단이 추가로 붙어서 완성됩니다.
const HAESEOL = {
  "정": [
    ["작은 불빛이지만 은은하게 오래가는 사람",
      "정화(丁火)는 태양처럼 사방을 비추는 불이 아니라, 손으로 감싸 지켜야 하는 촛불이나 등불에 비유됩니다. 화려하게 존재감을 드러내기보다, 곁에 있는 사람을 은은하게 오래 비추는 쪽에 가깝습니다. 처음엔 크게 눈에 띄지 않아도, 시간이 지날수록 '저 사람 참 한결같다'는 인상을 남기는 타입이에요."],
    ["혼자 있는 시간에 더 빛나는 감성",
      "불빛은 어둠이 있어야 비로소 드러납니다. 정화 일간은 소란스러운 자리보다 조용히 몰입할 수 있는 환경에서 진짜 실력이 나오는 편이에요. 혼자만의 시간을 답답해하기보다는, 그 시간을 통해 생각을 정리하고 감각을 벼리는 쪽으로 쓸 때 훨씬 좋은 결과가 따라옵니다."],
    ["겉은 부드럽고 속은 단단한 심지",
      "불은 부드럽게 일렁이는 듯 보여도, 그 중심에는 꺼지지 않는 심지가 있습니다. 온화하고 다정한 인상 뒤에, 웬만해서는 굽히지 않는 자기만의 기준이 자리하고 있는 편이에요. 처음 보는 사람은 순한 사람이라 생각했다가, 정작 중요한 순간에 보여주는 소신에 다시 보게 되는 경우가 많습니다."],
    ["어둠 속에서 길잡이가 되어주는 존재",
      "등불의 진짜 쓸모는 환한 대낮이 아니라 어두운 밤에 드러납니다. 주변 사람이 힘들거나 방향을 잃었을 때, 옆에서 조용히 등을 켜주는 역할을 자주 맡게 되는 편이에요. 정작 본인의 어려움은 잘 티 내지 않는 경우가 많아, 가끔은 스스로를 먼저 챙기는 연습도 필요합니다."],
    ["세심한 관찰력과 예민한 감각의 소유자",
      "작은 불씨는 바람 한 줄기에도 흔들립니다. 그만큼 주변의 미세한 변화나 사람의 감정 기복을 남들보다 빠르게 알아채는 예민한 감각을 지니고 있어요. 이 섬세함은 세심한 배려로 이어지기도 하지만, 지나치면 스스로를 쉽게 지치게 만들 수 있으니 적당한 거리 조절이 도움이 됩니다."],
    ["정 많고 배려심 깊지만 상처도 잘 받는 편",
      "따뜻한 불빛은 주는 것에 익숙합니다. 곁에 있는 사람을 살뜰히 챙기고, 필요할 때 기꺼이 마음을 내어주는 편이에요. 다만 그만큼 다른 사람의 말과 태도에도 민감하게 반응해서, 의도치 않은 말 한마디에도 오래 마음이 쓰이곤 합니다. 마음을 쓰는 만큼 스스로를 다독이는 시간도 함께 챙겨보세요."],
    ["예술적 감성과 표현력이 돋보이는 타입",
      "불은 형태 없이 흔들리며 고유의 아름다움을 만들어냅니다. 정화 일간 역시 정형화된 틀보다 자기만의 감각과 취향으로 무언가를 표현할 때 빛을 발하는 편이에요. 글이든 그림이든 대화든, 자신의 색깔을 담아낼 수 있는 활동에서 특히 만족감을 크게 느낍니다."],
    ["가까운 사람에게는 한없이 따뜻한 사람",
      "촛불은 아무에게나 곁을 내어주지 않지만, 한 번 곁을 내어준 사람에게는 깊고 오래가는 온기를 나눠줍니다. 낯선 자리에서는 조용한 편이지만, 마음을 연 관계에서는 누구보다 다정하고 세심한 모습을 보여주는 타입이에요."],

function hasBatchim(word) {
  const code = word.charCodeAt(word.length - 1) - 0xAC00;
  if (code < 0 || code > 11171) return true;
  return code % 28 !== 0;
}
function josaEulReul(word) { return hasBatchim(word) ? "을" : "를"; }
function josaIGa(word) { return hasBatchim(word) ? "이" : "가"; }

function josaGwaWa(word) { return hasBatchim(word) ? "과" : "와"; }

function chartSummary(person, itemIndex) {
  const dayStem = person.pillars.day[0];
  const dayBranch = person.pillars.day[1];
  const dayEl = STEM_INFO[dayStem].el;
  const yearBranch = person.pillars.year[1];

  const stemsToCheck = [];
  if (person.pillars.year) stemsToCheck.push(person.pillars.year[0]);
  if (person.pillars.month) stemsToCheck.push(person.pillars.month[0]);
  if (person.pillars.hour) stemsToCheck.push(person.pillars.hour[0]);
  const counts = {};
  stemsToCheck.forEach(s => {
    const t = sipsin(dayStem, s);
    counts[t] = (counts[t] || 0) + 1;
  });
  let dominant = null, maxCount = 0;
  for (const [k, v] of Object.entries(counts)) { if (v > maxCount) { dominant = k; maxCount = v; } }

  const branchSlots = [["시지", person.pillars.hour ? person.pillars.hour[1] : null], ["일지", dayBranch], ["월지", person.pillars.month[1]], ["연지", yearBranch]];
  const validSlots = branchSlots.filter(s => s[1]);
  const [label, branch] = validSlots[itemIndex % validSlots.length];
  const star = sinsal(yearBranch, branch);

  const dayStage = twelveUnseong(dayStem, dayBranch);

  let text = `명리학적으로 보면, 일간인 ${dayStem}(${dayEl})이 일지 ${dayBranch}${josaEulReul(dayBranch)} 만나 '${dayStage}'의 자리에 앉아 있습니다.`;
  if (dominant && maxCount >= 2) {
    text += ` 원국 안에 ${dominant}의 기운이 여러 자리에 걸쳐 나타나는데, 이는 ${SIPSIN_TRAIT[dominant]}${josaIGa(SIPSIN_TRAIT[dominant].slice(-1))} 두드러지는 형상으로 볼 수 있어요.`;
  } else if (dominant) {
    text += ` 그중에서도 ${dominant}${josaIGa(dominant)} 자리하고 있어, ${SIPSIN_TRAIT[dominant]}${josaGwaWa(SIPSIN_TRAIT[dominant])} 관련된 기운을 함께 지니고 있습니다.`;
  }
  text += ` 또한 ${label}(${branch})에는 '${star}'${josaIGa(star)} 자리해, ${SINSAL_TRAIT[star]}도 함께 엿볼 수 있는 사주예요.`;
  return text;
}

function pickReading(sipsinType, seed) {
  const pool = READING_POOL[sipsinType] || READING_POOL["비견"];
  const idx = ((seed % pool.length) + pool.length) % pool.length;
  return pool[idx];
}
function seedFromPillars(pillars) {
  const str = pillars.year.join('') + pillars.month.join('') + pillars.day.join('');
  let sum = 0;
  for (const ch of str) sum += ch.charCodeAt(0);
  return sum;
}

/* ===================== 렌더링 ===================== */
function charBox(ch, isStem) {
  const hanja = isStem ? TG_HANJA[ch] : DZ_HANJA[ch];
  const el = isStem ? STEM_INFO[ch].el : BRANCH_ELEMENT[ch];
  return `<div class="char-box" style="background:${ELEMENT_COLOR[el]}"><div class="hanja">${hanja}</div><div class="hangul">${ch}(${el})</div></div>`;
}

function renderPillarsGrid(person) {
  const dayStem = person.pillars.day[0];
  const yearBranch = person.pillars.year[1];
  const cols = [
    { key: "hour", label: "시주" },
    { key: "day", label: "일주" },
    { key: "month", label: "월주" },
    { key: "year", label: "연주" },
  ];
  const html = cols.map(col => {
    const p = person.pillars[col.key];
    if (!p) {
      return `
        <div class="pillar-col">
          <div class="pillar-label">${col.label}</div>
          <div class="no-data-box">시간<br>미상</div>
          <div class="no-data-box">-</div>
        </div>
      `;
    }
    const [stem, branch] = p;
    const stemSip = col.key === "day" ? "비견" : sipsin(dayStem, stem);
    return `
      <div class="pillar-col">
        <div class="pillar-label">${col.label}</div>
        ${charBox(stem, true)}
        <div class="sipsin-tag">${stemSip}</div>
        ${charBox(branch, false)}
        <div class="sub-row"><span class="sr-label">지장간</span>${HIDDEN_STEMS[branch]}</div>
        <div class="sub-row"><span class="sr-label">12운성</span>${twelveUnseong(dayStem, branch)}</div>
        <div class="sub-row"><span class="sr-label">신살</span>${sinsal(yearBranch, branch)}</div>
      </div>
    `;
  }).join('');
  return `<div class="manseryeok-title">만세력</div><div class="pillars-grid">${html}</div>`;
}

function renderTodayCard(person) {
  const { pair, dateStr, idx } = todayGanzhi();
  const [tStem, tBranch] = pair;
  const dayStem = person.pillars.day[0];
  const sip = sipsin(dayStem, tStem);
  const seed = seedFromPillars(person.pillars) + idx;
  const reading1 = pickReading(sip, seed);
  const reading2 = pickReading(sip, seed + 7);

  return `
    <div class="today-card">
      <div class="today-label">${dateStr} · Today's Fortune</div>
      <div class="today-headline">오늘의 일진과 ${person.name}님의 기운</div>
      <div class="today-ganzhi">
        <div class="char-box" style="background:${ELEMENT_COLOR[STEM_INFO[tStem].el]}"><div class="hanja">${TG_HANJA[tStem]}</div><div class="hangul">${tStem}${tBranch}</div></div>
        <div class="today-sipsin-label">오늘은 <strong>${person.name}</strong>님에게<br><strong>${sip}</strong>의 기운이 있는 날이에요.</div>
      </div>
      <ul class="reading-list-plain">
        <li>${reading1}</li>
        <li>${reading2}</li>
      </ul>
    </div>
  `;
}

function renderHaeseol(person) {
  const dayStem = person.pillars.day[0];
  const items = HAESEOL[dayStem] || HAESEOL["무"];
  const rows = items.map((item, i) => {
    const [title, opening] = item;
    const dataPara = chartSummary(person, i);
    const closing = CLOSING_ADVICE[i % CLOSING_ADVICE.length];
    const fullBody = `${opening}</p><p>${dataPara}</p><p>${closing}`;
    return `
      <div class="acc-item">
        <button class="acc-head" data-idx="${i}">
          <span>${title}</span>
          <span class="chev">▾</span>
        </button>
        <div class="acc-body"><div class="acc-body-inner"><p>${fullBody}</p></div></div>
      </div>
    `;
  }).join('');
  return `
    <div class="haeseol-title">사주해설</div>
    <div class="haeseol-hint">각 제목을 클릭하면 해설이 펼쳐져요</div>
    <div class="accordion">${rows}</div>
  `;
}

function renderPerson(person) {
  return `
    <div class="profile-card">
      <div class="profile-name">${person.name}님의 사주</div>
      <div class="profile-meta">${person.birthInfo}</div>
    </div>
    ${renderPillarsGrid(person)}
    ${renderTodayCard(person)}
    ${renderHaeseol(person)}
  `;
}

function main() {
  const tabsEl = document.getElementById('personTabs');
  const panelsEl = document.getElementById('panels');

  tabsEl.innerHTML = PEOPLE.map((p, i) =>
    `<button class="person-tab ${i === 0 ? 'active' : ''}" data-id="${p.id}">${p.name}</button>`
  ).join('');

  panelsEl.innerHTML = PEOPLE.map((p, i) =>
    `<div class="person-panel ${i === 0 ? 'active' : ''}" id="panel-${p.id}">${renderPerson(p)}</div>`
  ).join('');

  tabsEl.addEventListener('click', (ev) => {
    const btn = ev.target.closest('.person-tab');
    if (!btn) return;
    document.querySelectorAll('.person-tab').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.person-panel').forEach(p => {
      p.classList.toggle('active', p.id === `panel-${btn.dataset.id}`);
    });
  });

  panelsEl.addEventListener('click', (ev) => {
    const head = ev.target.closest('.acc-head');
    if (!head) return;
    head.closest('.acc-item').classList.toggle('open');
  });
}

main();
</script>
