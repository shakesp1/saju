<div class="wrap">
  <header>
    <div class="masthead-label">Family Saju Ledger</div>
    <h1>가족 사주 원장</h1>
    <div class="subhead">만세력(연·월·일·시주)은 한 번 계산되면 고정, "오늘의 운세"는 접속할 때마다 오늘 날짜 기준으로 자동 계산됩니다.</div>

    본 페이지는 규칙 기반 명리학 계산(연월일시주, 십성)을 사용하며, 지장간·12운성·신살 등 정밀 항목은
    이번 버전에 포함되어 있지 않습니다. 오늘의 운세 문구는 정해진 문장 풀에서 자동 선택되는
    참고용 콘텐츠로, 실제 전문 상담을 대체하지 않습니다.

<script>
/* ===================== 기초 데이터 ===================== */
const TG = ["갑","을","병","정","무","기","경","신","임","계"];
const TG_HANJA = {"갑":"甲","을":"乙","병":"丙","정":"丁","무":"戊","기":"己","경":"庚","신":"辛","임":"壬","계":"癸"};
const DZ = ["자","축","인","묘","진","사","오","미","신","유","술","해"];
const DZ_HANJA = {"자":"子","축":"丑","인":"寅","묘":"卯","진":"辰","사":"巳","오":"午","미":"未","신":"申","유":"酉","술":"戌","해":"亥"};

const STEM_INFO = {
  "갑": {el:"목", yy:"양"}, "을": {el:"목", yy:"음"},
  "병": {el:"화", yy:"양"}, "정": {el:"화", yy:"음"},
  "무": {el:"토", yy:"양"}, "기": {el:"토", yy:"음"},
  "경": {el:"금", yy:"양"}, "신": {el:"금", yy:"음"},
  "임": {el:"수", yy:"양"}, "계": {el:"수", yy:"음"},
};
const BRANCH_ELEMENT = {
  "자":"수","축":"토","인":"목","묘":"목","진":"토","사":"화",
  "오":"화","미":"토","신":"금","유":"금","술":"토","해":"수",
};
const ELEMENT_COLOR = { "목":"var(--wood)", "화":"var(--fire)", "토":"var(--earth)", "금":"var(--metal)", "수":"var(--water)" };
const GENERATES = { "목":"화","화":"토","토":"금","금":"수","수":"목" };
const CONTROLS  = { "목":"토","토":"수","수":"화","화":"금","금":"목" };

function sipsin(dayStem, targetStem) {
  const a = STEM_INFO[dayStem], b = STEM_INFO[targetStem];
  if (a.el === b.el) return a.yy === b.yy ? "비견" : "겁재";
  if (GENERATES[a.el] === b.el) return a.yy === b.yy ? "식신" : "상관";
  if (CONTROLS[a.el] === b.el) return a.yy === b.yy ? "편재" : "정재";
  if (CONTROLS[b.el] === a.el) return a.yy === b.yy ? "편관" : "정관";
  if (GENERATES[b.el] === a.el) return a.yy === b.yy ? "편인" : "정인";
  return "-";
}

// 60갑자 순서 (index 0 = 갑자) — 오늘의 일주 계산용
const JIAZI = [];
for (let i = 0; i < 60; i++) JIAZI.push([TG[i % 10], DZ[i % 12]]);
const DAY_OFFSET = 17; // 1970-01-01(UTC) 기준 보정값 (2024-01-01 = 갑자일로 검증됨)

function todayGanzhi() {
  // 한국시간(KST) 기준 오늘 날짜로 계산
  const kstStr = new Date().toLocaleString("en-US", { timeZone: "Asia/Seoul" });
  const kst = new Date(kstStr);
  const daysSinceEpoch = Math.floor(Date.UTC(kst.getFullYear(), kst.getMonth(), kst.getDate()) / 86400000);
  const idx = ((daysSinceEpoch + DAY_OFFSET) % 60 + 60) % 60;
  return { pair: JIAZI[idx], dateStr: `${kst.getFullYear()}-${String(kst.getMonth()+1).padStart(2,'0')}-${String(kst.getDate()).padStart(2,'0')}`, idx };
}

/* ===================== 인물별 고정 사주 데이터 ===================== */
// 연/월/일/시주는 정확한 만세력 계산(sxtwl, 절기 기준)으로 미리 산출되어 고정된 값입니다.
const PEOPLE = [

  },

  {

    birthInfo: "2023년 양력 2월 3일 11:06 출생",

/* ===================== 오늘의 운세 문장 풀 (십성별) ===================== */

    "혼자만의 시간에서 좋은 아이디어가 떠오를 수 있어요.",

  ],
  "정인": [

    "귀인의 도움이나 조언이 큰 힘이 될 수 있어요.",
    "문서, 계약, 공부와 관련된 일이 순조로운 하루예요.",
    "마음의 안정을 찾기 좋은 타이밍입니다.",
    "차분히 준비해온 일이 인정받을 수 있는 날이에요.",
  ],

function pickReading(sipsinType, seed) {
  const pool = READING_POOL[sipsinType] || READING_POOL["비견"];
  const idx = ((seed % pool.length) + pool.length) % pool.length;
  return pool[idx];
}

function seedFromPillars(pillars) {
  const str = pillars.year.join('') + pillars.month.join('') + pillars.day.join('');
  let sum = 0;
  for (const ch of str) sum += ch.charCodeAt(0);
  return sum;
}

/* ===================== 렌더링 ===================== */
function charBox(stem, branch, isStem) {
  const ch = isStem ? stem : branch;
  const hanja = isStem ? TG_HANJA[ch] : DZ_HANJA[ch];
  const el = isStem ? STEM_INFO[ch].el : BRANCH_ELEMENT[ch];
  return `
    <div class="char-box" style="background:${ELEMENT_COLOR[el]}">
      <div class="hanja">${hanja}</div>
      <div class="hangul">${ch}(${el})</div>
    </div>
  `;
}

function renderPillarsGrid(person) {
  const dayStem = person.pillars.day[0];
  const cols = [
    { key: "hour", label: "시주" },
    { key: "day", label: "일주" },
    { key: "month", label: "월주" },
    { key: "year", label: "연주" },
  ];
  const html = cols.map(col => {
    const p = person.pillars[col.key];
    if (!p) {
      return `
        <div class="pillar-col">
          <div class="pillar-label">${col.label}</div>
          <div class="no-data-box">시간<br>미상</div>
          <div class="no-data-box">-</div>
        </div>
      `;
    }
    const [stem, branch] = p;
    const stemSip = col.key === "day" ? "비견" : sipsin(dayStem, stem);
    return `
      <div class="pillar-col">
        <div class="pillar-label">${col.label}</div>
        ${charBox(stem, branch, true)}
        <div class="sipsin-tag">${stemSip}</div>
        ${charBox(stem, branch, false)}
      </div>
    `;
  }).join('');
  return `<div class="pillars-grid">${html}</div>`;
}

function renderTodayCard(person) {
  const { pair, dateStr } = todayGanzhi();
  const [tStem, tBranch] = pair;
  const dayStem = person.pillars.day[0];
  const sip = sipsin(dayStem, tStem);
  const seed = seedFromPillars(person.pillars) + todayGanzhi().idx;
  const reading1 = pickReading(sip, seed);
  const reading2 = pickReading(sip, seed + 7);

  return `
    <div class="today-card">
      <div class="today-label">${dateStr} · Today's Fortune</div>
      <div class="today-headline">오늘의 일진과 ${person.name}님의 기운</div>
      <div class="today-ganzhi">
        ${charBox(tStem, tBranch, true)}
        <div class="today-sipsin-label">오늘은 <strong>${person.name}</strong>님에게<br><strong>${sip}</strong>의 기운이 있는 날이에요.</div>
      </div>
      <ul class="reading-list">
        <li>${reading1}</li>
        <li>${reading2}</li>
      </ul>
    </div>
  `;
}

function renderPerson(person) {
  return `
    <div class="profile-card">
      <div class="profile-name">${person.name}님의 사주</div>
      <div class="profile-meta">${person.birthInfo}</div>
    </div>
    ${renderPillarsGrid(person)}
    ${renderTodayCard(person)}
  `;
}

function main() {
  const tabsEl = document.getElementById('personTabs');
  const panelsEl = document.getElementById('panels');

  tabsEl.innerHTML = PEOPLE.map((p, i) =>
    `<button class="person-tab ${i === 0 ? 'active' : ''}" data-id="${p.id}">${p.name}</button>`
  ).join('');

  panelsEl.innerHTML = PEOPLE.map((p, i) =>
    `<div class="person-panel ${i === 0 ? 'active' : ''}" id="panel-${p.id}">${renderPerson(p)}</div>`
  ).join('');

  tabsEl.addEventListener('click', (ev) => {
    const btn = ev.target.closest('.person-tab');
    if (!btn) return;
    document.querySelectorAll('.person-tab').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.person-panel').forEach(p => {
      p.classList.toggle('active', p.id === `panel-${btn.dataset.id}`);
    });
  });
}

main();
</script>
</body>
</html>
